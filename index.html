<!DOCTYPE html>
<html lang="es">

<head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <title>Se vienen cosas...</title>
   <link rel="icon" href="favicon.ico">
   <link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Jost:wght@200;300;400&display=swap"
      rel="stylesheet" />

   <style>
      *,
      *::before,
      *::after {
         box-sizing: border-box;
         margin: 0;
         padding: 0;
      }

      :root {
         /* --cream: #faf6f0; */
         --cream: #9b9897;
         --blush: #e8c9b8;
         --rose: #c9856a;
         --deep: #3a2a24;
         --gold: #c9a96e;
         --muted: #8a6f62;
         --text-scale: 1;
         /* ← controla TODO */

      }

      body {
         background: var(--cream);
         color: var(--deep);
         font-family: 'Parisienne', cursive;
         overflow-x: hidden;
         transition: background 1.2s ease, color 1.2s ease;
      }

      /* 🌙 MODO NOCHE */
      body.night {
         --cream: #2a1d1a;
         --blush: #5a3a32;
         --rose: #d08b73;
         --deep: #f5e9e4;
         --gold: #e6c27a;
         --muted: #c3a79b;
      }

      body::before {
         content: '';
         position: fixed;
         inset: 0;
         z-index: 0;
         opacity: .04;
         background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      }

      /* ✨ DORADO PREMIUM */
      .gold-text {
         background: linear-gradient(120deg, #c9a96e, #fff2c2, #c9a96e);
         background-size: 200% auto;
         -webkit-background-clip: text;
         -webkit-text-fill-color: transparent;
         animation: goldShine 6s linear infinite;
      }

      body.night .gold-text {
         background: linear-gradient(120deg, #e6c27a, #fff3c9, #e6c27a);
      }

      @keyframes goldShine {
         0% {
            background-position: 0% center;
         }

         100% {
            background-position: 200% center;
         }
      }

      #petals {
         position: fixed;
         inset: 0;
         pointer-events: none;
         z-index: 1;
      }

      .page {
         position: relative;
         z-index: 2;
         min-height: 100dvh;
         display: flex;
         flex-direction: column;
         align-items: center;
         justify-content: center;
         text-align: center;
         padding: clamp(2.5rem, 7vw, 5rem);
         gap: 2rem;
      }

      .tagline {
         color: #000;
      }

      .hero-title {
         font-size: clamp(3rem, 13vw, 8rem);
      }

      .timer-wrap {
         display: flex;
         gap: 1rem;
      }

      .timer-num {
         font-size: clamp(2.5rem, 10vw, 5rem);
         transition: all .6s ease;
      }

      .timer-num.visible {
         text-shadow: 0 0 12px rgba(201, 133, 106, .4);
         transform: scale(1.05);
      }

      .timer-label {
         font-family: 'Jost', sans-serif;
         font-size: .6rem;
         letter-spacing: .25em;
      }

      @media (max-width:600px) {
         .timer-num {
            font-size: 1.8rem;
         }
      }

      .section-label {
         color: #000;
         font-size: calc(clamp(.9rem, 2.5vw, 1.3rem) * var(--text-scale));
      }

      .timer-wrap {
         display: flex;
         align-items: flex-start;
         gap: clamp(3rem, 5vw, 3rem);
         /* ← más separación */
      }

      .countdown-note {
         font-size: calc(clamp(1rem, 3vw, 1.6rem) * var(--text-scale));
      }

      .tagline {
         font-size: calc(clamp(1rem, 3vw, 1.4rem) * var(--text-scale));
      }
   </style>
</head>

<body>

   <canvas id="petals"></canvas>

   <main class="page">

      <p class="tagline">Se vienen cosas...</p>

      <h1 class="hero-title">
         <em class="gold-text">En Mayo...</em>
      </h1>

      <p class="section-label ">¡Prepárate!</p>

      <div class="timer-wrap">
         <div>
            <div class="timer-num gold-text" id="days">00</div>
            <div class="timer-label">Días</div>
         </div>
         <div>
            <div class="timer-num gold-text" id="hours">00</div>
            <div class="timer-label">Horas</div>
         </div>
         <div>
            <div class="timer-num gold-text" id="minutes">00</div>
            <div class="timer-label">Min</div>
         </div>
         <div>
            <div class="timer-num gold-text" id="seconds">00</div>
            <div class="timer-label">Seg</div>
         </div>
      </div>

      <p class="countdown-note">
         "Lo más hermoso de la vida es lo inesperado... y lo que está por venir."
      </p>

   </main>

   <script>
      // 🌙 MODO DÍA/NOCHE
      const h = new Date().getHours();
      if (h >= 19 || h < 6) document.body.classList.add('night');

      // 🌸 PÉTALOS PREMIUM
      const canvas = document.getElementById('petals');
      const ctx = canvas.getContext('2d');
      let W, H, petals = [];

      function resize() {
         W = canvas.width = innerWidth;
         H = canvas.height = innerHeight;
      }
      resize();
      addEventListener('resize', resize);

      function mkPetal() {
         const d = Math.random();
         return {
            x: Math.random() * W,
            y: -20,
            r: d * 6 + 2,
            speed: d * .8 + .2,
            drift: (Math.random() - .5) * .3,
            swing: Math.random() * .02 + .01,
            angle: Math.random() * Math.PI * 2,
            rot: Math.random() * Math.PI * 2,
            rotS: (Math.random() - .5) * .02,
            op: d * .5 + .2,
            type: Math.random() > .5 ? 't' : 'e',
            color: ['#e8c9b8', '#c9856a', '#c9a96e', '#f0d8cc'][Math.floor(Math.random() * 4)]
         };
      }

      const COUNT = innerWidth < 600 ? 14 : 28;

      for (let i = 0; i < COUNT; i++) {
         let p = mkPetal();
         p.y = Math.random() * H;
         petals.push(p);
      }

      function drawP(p) {
         ctx.save();
         ctx.translate(p.x, p.y);
         ctx.rotate(p.rot);
         ctx.globalAlpha = p.op;
         ctx.fillStyle = p.color;

         ctx.beginPath();
         if (p.type === 't') {
            ctx.moveTo(0, -p.r * 1.6);
            ctx.quadraticCurveTo(p.r, 0, 0, p.r * 1.6);
            ctx.quadraticCurveTo(-p.r, 0, 0, -p.r * 1.6);
         } else {
            ctx.ellipse(0, 0, p.r, p.r * 1.4, 0, 0, Math.PI * 2);
         }
         ctx.fill();
         ctx.restore();
      }

      (function loop() {
         ctx.clearRect(0, 0, W, H);
         petals.forEach(p => {
            p.y += p.speed;
            p.angle += p.swing;
            p.x += Math.sin(p.angle) * .6 + p.drift;
            p.rot += p.rotS;
            if (p.y > H + 20) Object.assign(p, mkPetal());
            drawP(p);
         });
         requestAnimationFrame(loop);
      })();

      // ⏳ CONTADOR
      const TARGET = new Date('2026-05-13T00:00:00');

      (function tick() {
         let diff = TARGET - new Date();
         if (diff > 0) {
            const d = Math.floor(diff / 86400000);
            const h = Math.floor(diff / 3600000) % 24;
            const m = Math.floor(diff / 60000) % 60;
            const s = Math.floor(diff / 1000) % 60;

            days.textContent = String(d).padStart(2, '0');
            hours.textContent = String(h).padStart(2, '0');
            minutes.textContent = String(m).padStart(2, '0');
            seconds.textContent = String(s).padStart(2, '0');
         }
         requestAnimationFrame(tick);
      })();

      // ✨ GLOW
      const obs = new IntersectionObserver(e => {
         if (e[0].isIntersecting) {
            document.querySelectorAll('.timer-num').forEach(el => el.classList.add('visible'));
         }
      }, { threshold: .6 });

      obs.observe(document.querySelector('.timer-wrap'));

      // 📳 INTERACCIÓN MOBILE
      document.addEventListener('touchstart', e => {
         if (navigator.vibrate) navigator.vibrate(15);
      }, { passive: true });

   </script>

</body>

</html>
