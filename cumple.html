<!DOCTYPE html>
<html lang="es">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Feliz Cumpleaños Elenita</title>

   <link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Poppins:wght@300&display=swap"
      rel="stylesheet">

   <style>
      * {
         margin: 0;
         padding: 0;
         box-sizing: border-box;
      }

      body {
         min-height: 100vh;
         display: flex;
         justify-content: center;
         align-items: flex-start;
         background: linear-gradient(135deg, #d6d3d1, #f3f2f1);
         font-family: 'Poppins', sans-serif;
         overflow-y: auto;
         padding: 80px 20px 40px;
      }

      .container {
         text-align: center;
         color: #5c4a42;
         width: 100%;
         max-width: 800px;
         font-size: 130%;
      }

      .top-text {
         opacity: 0.7;
      }

      /* ✨ nombre con brillo */
      .name {
         font-family: 'Parisienne', cursive;
         font-size: clamp(4.5rem, 15vw, 9rem);
         margin: 10px 0;
         line-height: 1.1;

         background: linear-gradient(90deg, #d4b26a, #fff3c4, #d4b26a);
         background-size: 200%;
         -webkit-background-clip: text;
         -webkit-text-fill-color: transparent;

         animation: shine 4s linear infinite;
      }

      @keyframes shine {
         0% { background-position: -200%; }
         100% { background-position: 200%; }
      }

      .subtitle {
         font-family: 'Parisienne', cursive;
         margin-bottom: 15px;
         opacity: 0.8;
      }

      .message {
         font-family: 'Parisienne', cursive;
         line-height: 1.5;
         white-space: pre-line;
         padding: 0 10px;
      }

      /* 📋 lista */
      .list-item {
         font-size: 0.77em;
         display: block;
         margin: 8px 0;
      }

      /* 👇 espacio elegante arriba y abajo */
      .list-item:first-child {
         margin-top: 30px;
      }

      .list-item:last-child {
         margin-bottom: 30px;
      }

      /* cursor */
      .cursor {
         display: inline-block;
         width: 2px;
         background: #5c4a42;
         margin-left: 5px;
         animation: blink 1s infinite;
      }

      @keyframes blink {
         0%, 50%, 100% { opacity: 1; }
         25%, 75% { opacity: 0; }
      }

      /* confetti */
      .confetti {
         position: absolute;
         width: 6px;
         height: 6px;
         background: #d4b26a;
         top: -10px;
         animation: fall linear infinite;
      }

      @keyframes fall {
         to {
            transform: translateY(110vh) rotate(360deg);
         }
      }

      @media (max-width: 400px) {
         .message {
            font-size: 1.3rem;
         }

         .subtitle {
            font-size: 1.5rem;
         }
      }
   </style>
</head>

<body>

   <div class="container">
      <div class="top-text" id="topText"></div>
      <div class="name" id="name"></div>
      <div class="subtitle" id="subtitle"></div>
      <div class="message" id="text"></div><span class="cursor"></span>
   </div>

   <script>

      const lines = [
         { id: "topText", text: "Hoy no es un día cualquiera…" },
         { id: "name", text: "Elenita" },
         { id: "subtitle", text: "Hoy el mundo celebra tu historia ✨" },

         {
            id: "text", text: `\nPorque lo mejor de tu historia...
aún está por escribirse.\n`
         },

         {
            id: "text",
            text: `<span class="list-item">✨ A los 38, Coco Chanel revolucionó el mundo creando Chanel No. 5.</span>`,
            delay: 1200
         },

         {
            id: "text",
            text: `<span class="list-item">✨ A los 38, Amelia Earhart cruzó el Pacífico en solitario.</span>`,
            delay: 1200
         },

         {
            id: "text",
            text: `<span class="list-item">✨ A los 38, Madonna ganando un Globo de Oro en Evita.</span>`,
            delay: 1500
         },

         {
            id: "text", text: `\nY hoy...
tú estás exactamente ahí, Elenita.
Feliz cumpleaños ✨`
         }
      ];

      let lineIndex = 0;
      let charIndex = 0;

      function typeLine() {
         if (lineIndex >= lines.length) return;

         let current = lines[lineIndex];
         let element = document.getElementById(current.id);

         if (current.text.includes("<span")) {
            element.innerHTML += current.text;

            lineIndex++;
            let pause = current.delay ? current.delay : 400;
            setTimeout(typeLine, pause);
            return;
         }

         if (charIndex < current.text.length) {
            element.innerHTML += current.text.charAt(charIndex);
            charIndex++;
            setTimeout(typeLine, 35);
         } else {
            lineIndex++;
            charIndex = 0;

            let pause = current.delay ? current.delay : 400;
            setTimeout(typeLine, pause);
         }
      }

      typeLine();

      // confetti
      for (let i = 0; i < 30; i++) {
         const conf = document.createElement("div");
         conf.classList.add("confetti");
         conf.style.left = Math.random() * 100 + "vw";
         conf.style.animationDuration = (3 + Math.random() * 5) + "s";
         conf.style.opacity = Math.random();
         document.body.appendChild(conf);
      }

   </script>

</body>

</html>
